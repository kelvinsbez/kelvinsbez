name: Update Profile Terminal SVG

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout Repo
      uses: actions/checkout@v4

    - name: Configurar Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Instalar Dependências
      run: pip install requests

    - name: Executar Gerador
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: python generate_stats.py

    - name: Commit e Push dos SVGs atualizados
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action"
        git add assets/profile-dark.svg assets/profile-light.svg
        git commit -m "Build: Automatizado terminal stats SVG" || exit 0
        git push